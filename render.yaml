services:
  - type: web
    runtime: static
    name: media-tracker-front-end
    rootDir: front-end
    buildCommand: npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    buildFilter:
      paths:
        - front-end/**
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: MEDIA_TRACKER_APP_ENV
        value: prod
      - key: MEDIA_TRACKER_BACK_END_BASE_URL
        value: https://media-tracker-back-end.onrender.com

  - type: web
    runtime: node
    name: media-tracker-back-end
    plan: free
    rootDir: back-end
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /status
    buildFilter:
      paths:
        - back-end/**
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: MEDIA_TRACKER_BE_CONFIG
        sync: false
